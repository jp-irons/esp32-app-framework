<!DOCTYPE html>
<html lang="en">
	<head>
	  <meta charset="UTF-8" />
	  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
	  <title>ESP32 WiFi Provisioning</title>

	  <script src="/app.js" defer></script>
	  <link rel="stylesheet" href="/style.css">

	  <script>
	    document.addEventListener("DOMContentLoaded", () => {
	      loadScanResults();
	    });
	  </script>
	</head>
	
<body class="bg-gray-100 text-gray-900 min-h-screen relative">

  <!-- Provisioning Card -->
  <div class="max-w-xl mx-auto mt-10 p-6 bg-white shadow rounded-lg overflow-visible">

    <h1 class="text-2xl font-semibold mb-4">WiFi Provisioning</h1>

    <div class="mt-8">
      <h2 class="text-lg font-medium mb-3">Saved Credentials</h2>

      <ul id="cred-list" class="space-y-2"></ul>

      <div class="flex justify-end gap-3 mt-4 pt-4 border-t border-gray-300">
        <button id="btn-clear-creds"
                onclick="clearCredentials()"
                class="px-3 py-1 bg-blue-600 text-white rounded hover:bg-blue-700">
          Clear credentials
        </button>

        <button id="btn-clear-nvs"
                onclick="clearNvs()"
                class="px-3 py-1 bg-red-600 text-white rounded hover:bg-red-700">
          Clear NVS
        </button>

        <button id="btn-reboot"
                onclick="showConfirm(
		  						'danger',
		  						'Reboot Device',
		  						'Do you wish to reboot?',
		  						confirmReboot
							);
"
                class="px-3 py-1 bg-red-600 text-white rounded hover:bg-red-700">
          Reboot
        </button>
      </div>
    </div>

    <!-- Password -->
    <div class="mb-6">
      <label class="block font-medium mb-1">Password</label>

      <div class="flex items-center gap-3">
        <input id="password"
               type="password"
               class="flex-grow px-3 py-2 border rounded focus:ring focus:ring-blue-300"
               placeholder="Network password" />

        <button onclick="submitProvisioning()"
                class="px-4 py-2 bg-green-600 text-white rounded hover:bg-green-700">
          Save
        </button>
      </div>
    </div>

    <!-- Status -->
    <div id="status"
         class="mt-6 p-3 bg-gray-50 border rounded text-sm text-gray-700">
      Waiting for action…
    </div>

    <div class="mt-8 pt-6 border-t border-gray-300">
      <div class="flex justify-between items-center mb-2">
        <h2 class="text-lg font-medium">Available Networks</h2>
        <button onclick="loadScanResults()"
                class="px-3 py-1 bg-blue-600 text-white rounded hover:bg-blue-700">
          Refresh
        </button>
      </div>

      <div id="network-list" class="space-y-3">
        <!-- Populated dynamically -->
      </div>
    </div>

  </div> <!-- END provisioning card -->


  <!-- Message Modal -->
  <div id="message-modal"
       class="fixed inset-0 z-50 bg-black bg-opacity-40 flex items-center justify-center hidden">
    <div class="bg-white rounded shadow-lg p-6 w-80">
      <h2 id="message-modal-title" class="text-lg font-semibold mb-4"></h2>
      <p id="message-modal-message" class="text-sm text-gray-700 mb-6"></p>
      <div class="flex justify-end">
        <button onclick="hideMessageModal()"
                class="px-3 py-1 bg-gray-300 rounded hover:bg-gray-400">
          OK
        </button>
      </div>
    </div>
  </div>

  <!-- Confirmation Modal -->
  <div id="confirm-modal"
       class="fixed inset-0 z-50 bg-black bg-opacity-40 flex items-center justify-center hidden">
    <div class="bg-white rounded shadow-lg p-6 w-80">
      <h2 id="confirm-modal-title" class="text-lg font-semibold mb-4"></h2>
      <p id="confirm-modal-message" class="text-sm text-gray-700 mb-6"></p>

      <div class="flex justify-end gap-3">
        <button id="confirm-cancel-btn"
                class="px-3 py-1 bg-gray-300 rounded hover:bg-gray-400">
          Cancel
        </button>

        <button id="confirm-ok-btn"
                class="px-3 py-1 bg-blue-600 text-white rounded hover:bg-blue-700">
          OK
        </button>
      </div>
    </div>
  </div>
</html>
